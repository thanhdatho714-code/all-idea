<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 视觉感官实验室</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #030712; }
        .vision-node { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .active-node { fill: #eab308; filter: drop-shadow(0 0 12px #eab308); r: 8; }
        .link-line { stroke: #1f2937; stroke-width: 1; transition: all 0.5s; }
        .active-link { stroke: #eab308; stroke-width: 2; opacity: 0.8; }
    </style>
</head>
<body class="text-slate-200">
    <div class="max-w-4xl mx-auto px-4 py-12">
        <header class="mb-12 text-center">
            <h1 class="text-5xl font-black bg-clip-text text-transparent bg-gradient-to-r from-yellow-400 to-orange-600 mb-4">
                Multimodal Vision Lab
            </h1>
            <p class="text-slate-400 font-mono italic">Visualizing Cross-Modal Attention Mechanisms</p>
        </header>

        <div class="bg-slate-900/50 border border-slate-800 rounded-3xl p-8 backdrop-blur-xl shadow-2xl">
            <div class="relative w-full aspect-video bg-black/40 rounded-2xl border border-slate-700 mb-8 overflow-hidden">
                <svg id="network-svg" viewBox="0 0 800 450" class="w-full h-full">
                    <g id="links-group"></g>
                    <g id="nodes-group"></g>
                </svg>
                <div class="absolute bottom-4 left-6 flex items-center space-x-2">
                    <span class="w-3 h-3 bg-yellow-500 rounded-full animate-pulse"></span>
                    <span class="text-xs font-mono text-yellow-500 uppercase tracking-widest">Real-time Attention Tracking</span>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="space-y-4">
                    <h3 class="text-xl font-bold text-white">跨模态对齐 (Alignment)</h3>
                    <p class="text-slate-400 text-sm leading-relaxed">
                        在多模态模型中，AI 会将图像的 <span class="text-yellow-500 font-bold">Patches</span> 与文本的 <span class="text-blue-400 font-bold">Tokens</span> 映射到同一个数学空间。点击下方的"激活感知"观察它们是如何产生共鸣的。
                    </p>
                    <button onclick="simulateAttention()" class="bg-gradient-to-r from-yellow-500 to-orange-600 text-black font-black py-3 px-8 rounded-xl hover:scale-105 transition active:scale-95">
                        ACTIVATE PERCEPTION
                    </button>
                </div>
                <div class="bg-black/30 p-6 rounded-2xl border border-slate-800">
                    <div class="flex justify-between text-xs font-mono text-slate-500 mb-4">
                        <span>ATTENTION SCORE</span>
                        <span id="score-val">0.00</span>
                    </div>
                    <div class="w-full bg-slate-800 h-2 rounded-full overflow-hidden">
                        <div id="progress-bar" class="w-0 h-full bg-yellow-500 transition-all duration-700"></div>
                    </div>
                    <p class="mt-4 text-[10px] text-slate-500 font-mono">
                        [SYS]: Monitoring Latent Space resonance...<br>
                        [SYS]: Feature Extraction in progress...
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const nodesGroup = document.getElementById('nodes-group');
        const linksGroup = document.getElementById('links-group');
        const nodes = [];
        const links = [];

        // 初始化节点
        for (let i = 0; i < 40; i++) {
            const x = Math.random() * 700 + 50;
            const y = Math.random() * 350 + 50;
            const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            circle.setAttribute("cx", x);
            circle.setAttribute("cy", y);
            circle.setAttribute("r", "4");
            circle.setAttribute("class", "vision-node fill-slate-700");
            nodesGroup.appendChild(circle);
            nodes.push({ el: circle, x, y });
        }

        // 初始化连线
        for (let i = 0; i < 60; i++) {
            const n1 = nodes[Math.floor(Math.random() * nodes.length)];
            const n2 = nodes[Math.floor(Math.random() * nodes.length)];
            const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
            line.setAttribute("x1", n1.x);
            line.setAttribute("y1", n1.y);
            line.setAttribute("x2", n2.x);
            line.setAttribute("y2", n2.y);
            line.setAttribute("class", "link-line");
            linksGroup.appendChild(line);
            links.push(line);
        }

        function simulateAttention() {
            // 重置
            nodes.forEach(n => n.el.setAttribute("class", "vision-node fill-slate-700"));
            links.forEach(l => l.setAttribute("class", "link-line"));
            document.getElementById('progress-bar').style.width = '0%';

            // 激活随机路径
            setTimeout(() => {
                const activeCount = 15;
                for(let i=0; i<activeCount; i++) {
                    const idx = Math.floor(Math.random() * nodes.length);
                    nodes[idx].el.setAttribute("class", "vision-node active-node");
                }
                links.forEach(l => {
                    if(Math.random() > 0.8) l.setAttribute("class", "link-line active-link");
                });
                document.getElementById('progress-bar').style.width = '100%';
                document.getElementById('score-val').innerText = (Math.random() * 0.3 + 0.6).toFixed(4);
            }, 100);
        }
    </script>
</body>
</html>
